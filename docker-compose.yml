services:
  nginx:
    image: nginx:alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    # 移除直接端口映射，通过 nginx 访问
    volumes:
      - ./database:/app/database
    environment:
      - DATABASE_URL=sqlite:///./database/overtime.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped
