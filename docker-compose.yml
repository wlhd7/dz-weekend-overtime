services:
  nginx:
    image: nginx:alpine
    ports:
      - "8001:8001"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    # 移除直接端口映射，通过 nginx 访问
    volumes:
      - ./database:/app/database
    environment:
      - SQLITE_DATABASE_URL=sqlite:///database/weekend-overtime.sqlite
    restart: unless-stopped

  frontend:
    build: ./frontend
    # 移除直接端口映射，通过 nginx 访问
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  database:
