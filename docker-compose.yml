services:
  nginx:
    image: nginx:alpine
    container_name: dz-weekend-overtime-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - default
      - npm-network
    restart: unless-stopped

  backend:
    build: ./backend
    # 移除直接端口映射，通过 nginx 访问
    volumes:
      - ./backend/database:/app/backend/database
    environment:
      - DATABASE_URL=sqlite:///./backend/database/weekend-overtime.sqlite
    networks:
      - default
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - default
    restart: unless-stopped

networks:
  npm-network:
    external: true
