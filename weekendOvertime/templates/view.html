{% extends "base.html" %}

{% block title %}编辑加班内容{% endblock %}

{% block content %}
	<h2>编辑加班内容</h2>

	<p><a href="{{ url_for('index') }}">返回</a></p>

	{% if staffs and staffs|length > 0 %}
		<ul>
		{% for s in staffs %}
			<li>
				<strong>{{ s['name'] }}</strong>
				<ul>
					<li>
						<strong>周六</strong>
						<div>
							<select class="preset-content" data-staff-id="{{ s['id'] }}" data-day="sat">
								<option value="">(空)</option>
								{% for c in contents %}
									<option value="{{ c['preset_name'] }}" {% if s['sat_content'] == c['preset_name'] %}selected{% endif %}>{{ c['preset_name'] }}</option>
								{% endfor %}
							</select>
							<select class="preset-begin" data-staff-id="{{ s['id'] }}" data-day="sat">
								<option value="">(空)</option>
								{% for b in begin_options %}
									<option value="{{ b }}" {% if s['sat_begin_time'] == b %}selected{% endif %}>{{ b }}</option>
								{% endfor %}
							</select>
							<select class="preset-end" data-staff-id="{{ s['id'] }}" data-day="sat">
								<option value="">(空)</option>
								{% for e in end_options %}
									<option value="{{ e }}" {% if s['sat_end_time'] == e %}selected{% endif %}>{{ e }}</option>
								{% endfor %}
							</select>
						</div>
					</li>
					<li>
						<strong>周日</strong>
						<div>
							<select class="preset-content" data-staff-id="{{ s['id'] }}" data-day="sun">
								<option value="">(空)</option>
								{% for c in contents %}
									<option value="{{ c['preset_name'] }}" {% if s['sun_content'] == c['preset_name'] %}selected{% endif %}>{{ c['preset_name'] }}</option>
								{% endfor %}
							</select>
							<select class="preset-begin" data-staff-id="{{ s['id'] }}" data-day="sun">
								<option value="">(空)</option>
								{% for b in begin_options %}
									<option value="{{ b }}" {% if s['sun_begin_time'] == b %}selected{% endif %}>{{ b }}</option>
								{% endfor %}
							</select>
							<select class="preset-end" data-staff-id="{{ s['id'] }}" data-day="sun">
								<option value="">(空)</option>
								{% for e in end_options %}
									<option value="{{ e }}" {% if s['sun_end_time'] == e %}selected{% endif %}>{{ e }}</option>
								{% endfor %}
							</select>
						</div>
					</li>
				</ul>
			</li>
		{% endfor %}
		</ul>
	{% else %}
		<p>当前部门没有已登记的加班人员。</p>
	{% endif %}

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			function sendUpdate(staffId, day, content, beginTime, endTime) {
				fetch("{{ url_for('view') }}", {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ staff_id: Number(staffId), day: day, content: content, begin_time: beginTime, end_time: endTime })
				}).then(function (res) { return res.json(); }).then(function (json) {
					if (!json || !json.ok) {
						alert('更新失败: ' + (json && json.error ? json.error : '未知错误'));
					}
				}).catch(function (err) {
					alert('网络错误，更新失败');
				});
			}

			document.querySelectorAll('select.preset-content, select.preset-begin, select.preset-end').forEach(function (sel) {
				sel.addEventListener('change', function () {
					var staffId = this.getAttribute('data-staff-id');
					var day = this.getAttribute('data-day');
					var contentSel = document.querySelector('select.preset-content[data-staff-id="' + staffId + '"][data-day="' + day + '"]');
					var beginSel = document.querySelector('select.preset-begin[data-staff-id="' + staffId + '"][data-day="' + day + '"]');
					var endSel = document.querySelector('select.preset-end[data-staff-id="' + staffId + '"][data-day="' + day + '"]');
					var content = contentSel ? contentSel.value : '';
					var begin = beginSel ? beginSel.value : '';
					var end = endSel ? endSel.value : '';
					sendUpdate(staffId, day, content, begin, end);
				});
			});
		});
	</script>
{% endblock %}
